kind = "mobile"
previewPath = "/mobile/"
title = "Not My Road – Mobile"
version = "1.0.0"
id = "artifacts/nmr-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19281

[services.development]
run = "pnpm --filter @workspace/nmr-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nmr-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nmr-mobile", "run", "serve" ]

[services.env]
PORT = "19281"
BASE_PATH = "/mobile/"
